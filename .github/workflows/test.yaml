name: Test

on:
    push:
        branches: [main]
    pull_request:
        branches: "*"

jobs:
    test:
        if: false
        runs-on: ${{ matrix.os }}
        defaults:
            run:
                shell: bash -e {0} # -e to fail on error

        strategy:
            fail-fast: false
            matrix:
                python: ["3.12"]
                os: [ubuntu-latest]

        env:
            OS: ${{ matrix.os }}
            PYTHON: ${{ matrix.python }}

        steps:
            - uses: actions/checkout@v2
            - uses: astral-sh/setup-uv@v5
              id: setup-uv
              with:
                  version: "latest"
                  python-version: ${{ matrix.python }}
            - name: Install dependencies
              run: "uv sync --extra dev"
            - name: Test
              env:
                  MPLBACKEND: agg
                  PLATFORM: ${{ matrix.os }}
                  DISPLAY: :42
              run: |
                  uv run pytest --cov --color=yes --cov-report=xml
